name: CI

on:
  pull_request:

# "cargo" default package results in v1.75, which doesn't support v4 lock files
# "cargo test uses lib and bins only, as doc test breaks for some reason
# chmod vmlinuz-`uname -r` as it's 0600 by default
# chmod /dev/kvm to allow non-root QEMU to use it
# if building distro config install: libdw-dev libssl-dev
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: install rust and kernel build tools
        run: |
          case "$(uname -m)" in
          x86_64)
            export QEMU_SYSTEM=qemu-system-x86
            ;;
          aarch64)
            export QEMU_SYSTEM=qemu-system-aarch64
            ;;
          *)
            exit 1
            ;;
          esac
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends --no-install-suggests \
            cargo-1.85 rustc "$QEMU_SYSTEM" qemu-utils \
            make flex bison libelf-dev
      - name: cargo test
        run: |
          cargo-1.85 test --offline --lib --bins
          pushd src/cpio
          cargo-1.85 test --offline --lib --bins
          popd
          pushd src/kv-conf/
          cargo-1.85 test --offline --lib --bins
          popd
      - name: build and setup rapido net
        run: |
          cargo-1.85 build --offline --release
          cp -r net-conf.example/ net-conf
          sudo EDITOR=cat ./rapido setup-network -o $USER -b rapido-br -a "192.168.155.10/24"
          sudo chmod 0644 /boot/vmlinuz-*
          sudo chmod 0666 /dev/kvm
      - name: boot guest kernel VM
        run: |
         ./rapido cut -B -x "ping -c3 192.168.155.10 && echo test passed; exit" simple-network
         ./target/release/lscpio initrds/myinitrd
         ./rapido boot
      - name: clone and build mainline kernel
        run: |
          git clone --depth 1 -b master https://github.com/torvalds/linux ${HOME}/linux
          cp kernel/fstests_btrfs_zram.defconfig ${HOME}/linux/.config
          pushd ${HOME}/linux
          make olddefconfig
          make -j$(nproc)
          make modules_install INSTALL_MOD_PATH=./mods
          # this gives us modules.dep, etc. which rapido needs.
          # XXX should come with modules_install but doesn't... perhaps due to no modules?
          objtree=./ INSTALL_MOD_PATH=./mods ./scripts/depmod.sh "$(cat include/config/kernel.release)"
          popd
      - name: boot mainline kernel VM
        run: |
          printf "KERNEL_SRC=${HOME}/linux\nKERNEL_INSTALL_MOD_PATH=${HOME}/linux/mods\n" > rapido.conf
          ./rapido cut -x "cat /proc/filesystems; exit" simple-network
      - name: install xfstests build dependencies
        run: |
          # TODO use headers from kernel source
          sudo apt-get install acl attr automake bc dbench dump e2fsprogs fio gawk \
            gcc git indent libacl1-dev libaio-dev libcap-dev libgdbm-dev libtool \
            libtool-bin liburing-dev libuuid1 lvm2 make psmisc python3 quota sed \
            uuid-dev uuid-runtime xfsprogs linux-headers-$(uname -r) sqlite3 libgdbm-compat-dev \
            xfsdump xfslibs-dev btrfs-progs pkg-config
          # set /dev/kvm mode again, as installation may have triggered udev rules
          sudo chmod 0666 /dev/kvm
      - name: clone and build xfstests
        run: |
          git clone --depth 1 -b master \
            https://git.kernel.org/pub/scm/fs/xfs/xfstests-dev.git \
            ${HOME}/xfstests
          pushd ${HOME}/xfstests
          make -j$(nproc)
          popd
      - name: boot mainline kernel with xfstests
        run: |
          # rapido fstests-btrfs uses 5x guest-zram-dev by default (for raid),
          # but we probably don't have enough memory. Use compressed qcow2:
          test_img="${HOME}/fstests_test_zstd.qcow2"
          scratch_img="${HOME}/fstests_scratch_zstd.qcow2"
          qemu-img create -f qcow2 -o compression_type=zstd "$test_img" 8G
          qemu-img create -f qcow2 -o compression_type=zstd "$scratch_img" 8G
          mkdir "${HOME}/9p"
          printf "FSTESTS_SRC=${HOME}/xfstests\nFSTESTS_ZRAM_SIZE=0\nVIRTFS_SHARE_PATH=${HOME}/9p\n" \
            >> rapido.conf
          printf 'QEMU_EXTRA_ARGS="-nographic -device virtio-rng-pci -drive id=test,file='"$test_img"',if=none,cache=none -device virtio-blk-pci,drive=test,bus=pci.0,serial=TEST_DEV -drive id=scratch,file='"$scratch_img"',if=none,cache=none -device virtio-blk-pci,drive=scratch,bus=pci.0,serial=SCRATCH_DEV"' \
            >> rapido.conf
          ./rapido cut \
            -x "./check -R xunit -g quick; cp results/result.xml /host/; exit" \
            fstests-btrfs
      - name: dump results
        run: |
          cat "${HOME}/9p/result.xml"
      - name: Archive xunit test results
        uses: actions/upload-artifact@v4
        with:
          name: xunit-results
          path: ~/9p/result.xml
          retention-days: 2
